<svg xmlns="http://www.w3.org/2000/svg" width="620" height="520" viewBox="0 0 620 520" role="img" aria-labelledby="title desc"><title id="title">Amethyst governed approval packet</title><desc id="desc">A synthetic UI card showing evidence, policy decision, approval and separate writeback.</desc><rect width="620" height="520" rx="24" fill="#0c0b11"/><rect x="1" y="1" width="618" height="518" rx="23" fill="none" stroke="#fff" stroke-opacity=".08"/><g font-family="Inter, ui-sans-serif, system-ui, sans-serif"><text x="28" y="42" fill="#fafafa" font-size="18" font-weight="700">Learning approval packet</text><rect x="446" y="22" width="145" height="28" rx="14" fill="#fbbf24" fill-opacity=".1" stroke="#fbbf24" stroke-opacity=".25"/><text x="469" y="41" fill="#fde68a" font-size="11" font-weight="650">REQUIRES APPROVAL</text><text x="28" y="76" fill="#71717a" font-size="11">Mission</text><text x="28" y="98" fill="#e4e4e7" font-size="14" font-weight="600">Improve enterprise demo conversion</text><rect x="24" y="120" width="572" height="84" rx="14" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="42" y="148" fill="#8b8b98" font-size="11">Proposed governed claim</text><text x="42" y="174" fill="#fafafa" font-size="14" font-weight="650">Security proof should lead the enterprise demo.</text><text x="42" y="193" fill="#71717a" font-size="11">Confidence: high · valid from: Q3 launch</text><g transform="translate(24 222)"><rect width="274" height="112" rx="14" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="18" y="28" fill="#fafafa" font-size="13" font-weight="650">Evidence</text><circle cx="22" cy="55" r="4" fill="#22c55e"/><text x="34" y="59" fill="#a1a1aa" font-size="11">3 reviewed sales-call notes</text><circle cx="22" cy="78" r="4" fill="#22c55e"/><text x="34" y="82" fill="#a1a1aa" font-size="11">1 verified conversion result</text><circle cx="22" cy="101" r="4" fill="#60a5fa"/><text x="34" y="105" fill="#a1a1aa" font-size="11">Source freshness: current</text><rect x="292" width="280" height="112" rx="14" fill="#181327" stroke="#8b5cf6" stroke-opacity=".25"/><text x="310" y="28" fill="#fafafa" font-size="13" font-weight="650">Policy decision</text><text x="310" y="58" fill="#c4b5fd" font-size="12" font-weight="650">require_approval</text><text x="310" y="82" fill="#8b8b98" font-size="11">Reason: modifies reusable positioning</text><text x="310" y="101" fill="#8b8b98" font-size="11">Required role: workspace owner</text></g><rect x="24" y="352" width="572" height="68" rx="14" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="42" y="378" fill="#fafafa" font-size="13" font-weight="650">Approval effect</text><text x="42" y="400" fill="#8b8b98" font-size="11">Approval freezes the proposal. Writeback remains a separate idempotent action.</text><rect x="24" y="444" width="166" height="44" rx="12" fill="#26232d"/><text x="77" y="471" fill="#d4d4d8" font-size="12" font-weight="650">Deny</text><rect x="204" y="444" width="166" height="44" rx="12" fill="#8b5cf6" fill-opacity=".16" stroke="#8b5cf6" stroke-opacity=".38"/><text x="248" y="471" fill="#ede9fe" font-size="12" font-weight="650">Approve</text><rect x="384" y="444" width="212" height="44" rx="12" fill="#22c55e" fill-opacity=".1" stroke="#22c55e" stroke-opacity=".25"/><text x="427" y="471" fill="#bbf7d0" font-size="12" font-weight="650">Write back approved claim</text></g></svg>