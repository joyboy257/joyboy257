<svg xmlns="http://www.w3.org/2000/svg" width="620" height="520" viewBox="0 0 620 520" role="img" aria-labelledby="title desc"><title id="title">Amethyst operational readiness controls</title><desc id="desc">A synthetic UI showing capability gates, observability, backup, restore and rollback evidence.</desc><rect width="620" height="520" rx="24" fill="#0c0b11"/><rect x="1" y="1" width="618" height="518" rx="23" fill="none" stroke="#fff" stroke-opacity=".08"/><g font-family="Inter, ui-sans-serif, system-ui, sans-serif"><text x="28" y="42" fill="#fafafa" font-size="18" font-weight="700">Operational readiness</text><text x="28" y="66" fill="#71717a" font-size="11">Internal production · synthetic canary only</text><g transform="translate(24 94)"><rect width="572" height="136" rx="16" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="18" y="28" fill="#fafafa" font-size="13" font-weight="650">Capability gates</text><g transform="translate(18 48)"><text y="18" fill="#a1a1aa" font-size="11">Brain mutations</text><rect x="420" width="116" height="28" rx="14" fill="#22c55e" fill-opacity=".1"/><circle cx="438" cy="14" r="5" fill="#22c55e"/><text x="450" y="18" fill="#bbf7d0" font-size="10">enabled</text><text y="46" fill="#a1a1aa" font-size="11">Learning writeback</text><rect x="420" y="28" width="116" height="28" rx="14" fill="#22c55e" fill-opacity=".1"/><circle cx="438" cy="42" r="5" fill="#22c55e"/><text x="450" y="46" fill="#bbf7d0" font-size="10">enabled</text><text y="74" fill="#a1a1aa" font-size="11">Live provider writes</text><rect x="420" y="56" width="116" height="28" rx="14" fill="#f87171" fill-opacity=".1"/><circle cx="438" cy="70" r="5" fill="#f87171"/><text x="450" y="74" fill="#fecaca" font-size="10">disabled</text></g></g><g transform="translate(24 248)"><rect width="274" height="122" rx="16" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="18" y="28" fill="#fafafa" font-size="13" font-weight="650">Health</text><text x="18" y="62" fill="#22c55e" font-size="29" font-weight="700">200 / 200</text><text x="18" y="84" fill="#8b8b98" font-size="11">health + readiness during release</text><text x="18" y="106" fill="#60a5fa" font-size="11">0 critical attention items</text><rect x="292" width="280" height="122" rx="16" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="310" y="28" fill="#fafafa" font-size="13" font-weight="650">Recovery</text><text x="310" y="58" fill="#d4d4d8" font-size="12">Backup</text><text x="520" y="58" fill="#bbf7d0" font-size="11">verified</text><text x="310" y="82" fill="#d4d4d8" font-size="12">Restore rehearsal</text><text x="520" y="82" fill="#bbf7d0" font-size="11">passed</text><text x="310" y="106" fill="#d4d4d8" font-size="12">Rollback</text><text x="510" y="106" fill="#c4b5fd" font-size="11">40 seconds</text></g><rect x="24" y="370" width="572" height="118" rx="16" fill="#15131b" stroke="#fff" stroke-opacity=".07"/><text x="42" y="398" fill="#fafafa" font-size="13" font-weight="650">Release observation</text><line x1="62" y1="443" x2="558" y2="443" stroke="#3f3a4b" stroke-width="3"/><g fill="#22c55e"><circle cx="72" cy="443" r="8"/><circle cx="190" cy="443" r="8"/><circle cx="308" cy="443" r="8"/><circle cx="426" cy="443" r="8"/><circle cx="548" cy="443" r="8"/></g><g fill="#8b8b98" font-size="10"><text x="65" y="468">0m</text><text x="183" y="468">5m</text><text x="298" y="468">15m</text><text x="416" y="468">30m</text><text x="538" y="468">60m</text></g></g></svg>