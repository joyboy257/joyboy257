<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
<title id="title">Amethyst governed context and learning flow</title><desc id="desc">Evidence moves through governance into point-in-time context, AI work, proof, and reviewed learning.</desc>
